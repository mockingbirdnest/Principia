syntax = "proto2";

import "serialization/geometry.proto";

package principia.serialization;

// An auxiliary message used to represent tabulated data.  Useful for tests that
// verify precomputed results.  The arguments and values are to be interpreted
// by the test.
message TabulatedData {
  message Entry {
    repeated double argument = 1;
    repeated double value = 2;
  }
  repeated Entry entry = 1;
}

// An auxiliary message that can be checkpointed.  Useful for testing the
// checkpointing machinery.
message CheckpointerTestMessage {
  message Checkpoint {
    optional Point time = 1;
    optional int32 payload = 2;
  }
  repeated Checkpoint checkpoint = 1;
}
